development:
  analytics_live_update:
    class: Analytics::LiveBroadcastJob
    queue: default
    schedule: every 30 seconds

  refresh_due_google_search_console_connections:
    class: Analytics::RefreshDueGoogleSearchConsoleConnectionsJob
    queue: default
    schedule: every hour at minute 23

production:
  analytics_live_update:
    class: Analytics::LiveBroadcastJob
    queue: default
    schedule: every 30 seconds

  refresh_due_google_search_console_connections:
    class: Analytics::RefreshDueGoogleSearchConsoleConnectionsJob
    queue: default
    schedule: every hour at minute 23

  check_due_library_sources:
    class: CheckDueLibrarySourcesJob
    queue: default
    schedule: every hour at minute 17

  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  account_incineration:
    class: AccountIncinerationJob
    queue: background
    schedule: at 3am every day

  cleanup_website_crawl_state:
    class: CleanupWebsiteCrawlStateJob
    queue: background
    schedule: at 3:30am every day
