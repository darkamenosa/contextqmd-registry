test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

<%
  cloudflare_account_id = ENV["CLOUDFLARE_ACCOUNT_ID"].presence || Rails.application.credentials.dig(:cloudflare, :account_id)
  cloudflare_access_key_id = ENV["CLOUDFLARE_R2_ACCESS_KEY_ID"].presence || Rails.application.credentials.dig(:cloudflare, :access_key_id)
  cloudflare_secret_access_key = ENV["CLOUDFLARE_R2_SECRET_ACCESS_KEY"].presence || Rails.application.credentials.dig(:cloudflare, :secret_access_key)
  cloudflare_public_bucket = ENV["CLOUDFLARE_PUBLIC_BUCKET"].presence || Rails.application.credentials.dig(:cloudflare, :public_bucket)
  cloudflare_private_bucket = ENV["CLOUDFLARE_PRIVATE_BUCKET"].presence || Rails.application.credentials.dig(:cloudflare, :private_bucket)
%>

r2_public_assets:
  service: S3
  endpoint: https://<%= cloudflare_account_id %>.r2.cloudflarestorage.com
  access_key_id: <%= cloudflare_access_key_id %>
  secret_access_key: <%= cloudflare_secret_access_key %>
  region: auto
  force_path_style: true
  request_checksum_calculation: when_required
  response_checksum_validation: when_required
  bucket: <%= cloudflare_public_bucket %>
  public: true
  upload:
    cache_control: "public, max-age=31536000, immutable"

r2_private_assets:
  service: S3
  endpoint: https://<%= cloudflare_account_id %>.r2.cloudflarestorage.com
  access_key_id: <%= cloudflare_access_key_id %>
  secret_access_key: <%= cloudflare_secret_access_key %>
  region: auto
  force_path_style: true
  request_checksum_calculation: when_required
  response_checksum_validation: when_required
  bucket: <%= cloudflare_private_bucket %>
