<% require "dotenv"; Dotenv.load(".env") %>

# Name of your application. Used to uniquely configure containers.
service: contextqmd_registry

# Name of the container image.
image: tuyenhx/contextqmd_registry

# Deploy to these servers.
servers:
  web:
    - 46.225.105.37
  vite:
    hosts:
      - 46.225.105.37
    cmd: node public/vite-ssr/ssr.js
    options:
      init: true
      network-alias: vite_ssr
  job:
    hosts:
      - 46.225.105.37
    cmd: bin/jobs
    options:
      init: true

# Enable SSL auto certification via Let's Encrypt.
# Note: If using Cloudflare, set encryption mode to "Full" in SSL/TLS settings.
proxy:
  ssl: true
  host: contextqmd.com

# Credentials for your image host.
registry:
  username: tuyenhx
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_PASSWORD
    - CLOUDFLARE_R2_ACCESS_KEY_ID
    - CLOUDFLARE_R2_SECRET_ACCESS_KEY
  clear:
    # Dedicated job container handles queue processing.
    SOLID_QUEUE_IN_PUMA: false

    # Database configuration
    DB_HOST: contextqmd_registry-db
    APP_HOST: contextqmd.com
    INERTIA_SSR_URL: http://vite_ssr:13714
    CLOUDFLARE_ACCOUNT_ID: <%= ENV["CLOUDFLARE_ACCOUNT_ID"] %>
    CLOUDFLARE_PUBLIC_BUCKET: <%= ENV.fetch("CLOUDFLARE_PUBLIC_BUCKET", "contextqmd-public-assets") %>
    CLOUDFLARE_PRIVATE_BUCKET: <%= ENV.fetch("CLOUDFLARE_PRIVATE_BUCKET", "contextqmd-private-assets") %>
    CLOUDFLARE_PUBLIC_URL: <%= ENV.fetch("CLOUDFLARE_PUBLIC_URL", "https://cdn.contextqmd.com") %>

    # Job queue configuration - optimized for 2 vCPU, 4GB RAM
    JOB_CONCURRENCY: 2

    # Web server configuration - optimized for 2 vCPU, 4GB RAM
    WEB_CONCURRENCY: 2
    RAILS_MAX_THREADS: 6

# Aliases for common commands.
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"

# Persistent storage volume for Active Storage files.
volumes:
  - "contextqmd_registry_storage:/rails/storage"

# Bridge fingerprinted assets between versions.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch:
    - amd64
    - arm64

# PostgreSQL database accessory.
accessories:
  db:
    image: postgres:18
    host: 46.225.105.37
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: contextqmd_registry
        POSTGRES_DB: contextqmd_registry_production
      secret:
        - POSTGRES_PASSWORD
    files:
      - db/production.sql:/docker-entrypoint-initdb.d/setup.sql
    directories:
      - contextqmd_registry_data:/var/lib/postgresql
